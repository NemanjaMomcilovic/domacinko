<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>10KEY predstavlja</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .splash-screen {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      margin: 0 auto;
      background:
        radial-gradient(circle at center, rgba(45, 143, 92, 0.2), transparent 45%),
        linear-gradient(#090909, #000);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px;
    }
    .splash-presents {
      font-size: 0.9rem;
      color: #c9a227;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 16px;
      animation: fadeIn 1s ease;
    }
    .splash-logo {
      font-size: 3rem;
      font-weight: 800;
      color: #2d8f5c;
      text-shadow: 0 0 50px rgba(45, 143, 92, 0.4);
      animation: fadeIn 1.2s ease;
    }
    .splash-sub {
      margin-top: 10px;
      color: #8a9a92;
      font-size: 1rem;
      animation: fadeIn 1.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="splash-screen">
    <p class="splash-presents">10KEY predstavlja</p>
    <div class="splash-logo">Domaćinko</div>
    <p class="splash-sub">Vaš AI pomoćnik za domaćinstvo</p>
  </div>
  <script src="js/storage.js"></script>
  <script>
    setTimeout(function () {
      if (typeof setSplashSeen === 'function') setSplashSeen();
      else localStorage.setItem('splashSeen', 'true');
      const onboarded = localStorage.getItem('onboardingComplete') === 'true';
      window.location.replace(onboarded ? 'pages/home.html' : 'pages/onboarding.html');
    }, 3000);
  </script>
</body>
</html>
