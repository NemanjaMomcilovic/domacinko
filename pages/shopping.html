<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d8f5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Domaćinko">
  <title>Domaćinko — Kupovina</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../assets/icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.png">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header" id="page-header"></header>

    <main class="main-content">
      <p class="text-muted text-center mb-md" id="list-count" style="font-size:var(--font-size-sm)"></p>

      <div id="favorite-chips" class="mb-md"></div>

      <div id="shopping-list"></div>

      <form id="add-item-form" class="mt-md">
        <div style="display:flex;gap:var(--space-sm);margin-bottom:var(--space-sm)">
          <select class="form-select" id="item-category" style="width:120px" aria-label="Kategorija proizvoda"></select>
          <input type="text" class="form-input" id="item-name" placeholder="Dodaj proizvod..." required style="flex:1">
        </div>
        <button type="submit" class="btn btn--primary btn--block">Dodaj na listu</button>
      </form>

      <button class="btn btn--outline btn--block mt-md" id="clear-list">Obriši listu</button>

      <div class="section mt-lg">
        <h2 class="section__title">Ostava — niska zaliha</h2>
        <div class="card card--flat" id="pantry-warnings"></div>
      </div>

      <div class="section mt-lg">
        <h2 class="section__title">Navike kupovine</h2>
        <p class="text-muted mb-sm" style="font-size:var(--font-size-xs)">Prepoznato iz istorije troškova</p>
        <div class="card card--flat" id="purchase-patterns"></div>
      </div>

      <div class="section">
        <h2 class="section__title">Lista praćenja cena</h2>
        <p class="text-muted mb-sm" style="font-size:var(--font-size-xs)">Placeholder — ručno pratite proizvode</p>
        <div class="card card--flat" id="watch-list"></div>
        <div class="card card--flat mt-sm" style="padding:var(--space-md)">
          <input type="text" class="form-input" id="watch-name" placeholder="Proizvod">
          <input type="number" class="form-input mt-sm" id="watch-price" placeholder="Ciljna cena">
          <button type="button" class="btn btn--secondary btn--block mt-sm" id="add-watch">Dodaj na listu</button>
        </div>
      </div>
    </main>

    <nav class="bottom-nav" id="bottom-nav"></nav>
  </div>

  <script src="../config.js" onerror="void 0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui-helpers.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/pages/shopping.js"></script>
</body>
</html>
