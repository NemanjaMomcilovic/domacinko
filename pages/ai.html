<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d8f5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Domaćinko">
  <title>Domaćinko · 10KEY Savetnik</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../assets/icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.png">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="no-voice">
  <div class="app-container">
    <header class="page-header" id="page-header"></header>

    <div class="ai-status" id="ai-status" role="status" aria-live="polite"></div>

    <div class="tabs" id="ai-tabs" style="padding:0 var(--space-lg)">
      <button type="button" class="tab active" data-tab="savetnik" aria-label="10KEY Savetnik">🧠 Savetnik</button>
      <button type="button" class="tab" data-tab="majstor" aria-label="AI Majstor">🔧 Majstor</button>
      <button type="button" class="tab" data-tab="ucitelj" aria-label="AI Učitelj">📚 Učitelj</button>
    </div>

    <main class="main-content main-content--chat" id="panel-savetnik">
      <div class="quick-chips" id="quick-chips"></div>
      <div class="chat-area">
        <div class="chat-messages" id="chat-messages"></div>
      </div>
      <div class="chat-input-bar">
        <button type="button" class="btn btn--ghost chat-voice" id="chat-voice" aria-label="Glasovni unos" title="Glasovni unos">🎤</button>
        <input type="text" class="form-input" id="chat-input" placeholder="Pitaj 10KEY Savetnika..." autocomplete="off" aria-label="Poruka za 10KEY Savetnik">
        <button class="btn btn--primary" id="chat-send" aria-label="Pošalji poruku">Pošalji</button>
      </div>
    </main>

    <main class="main-content hidden" id="panel-majstor">
      <p class="text-muted text-center mb-md" style="font-size:var(--font-size-sm)">
        AI Majstor za kućne popravke — korak po korak na srpskom.
      </p>
      <div class="quick-chips" id="majstor-categories" style="padding:0"></div>
      <div class="card">
        <div class="form-group">
          <textarea class="form-textarea" id="majstor-problem" rows="3" placeholder="Opišite problem..."></textarea>
        </div>
        <button type="button" class="btn btn--primary btn--block" id="majstor-submit">Daj savet</button>
      </div>
      <div id="majstor-result" class="mt-md"></div>
      <a href="repairs.html" class="btn btn--ghost btn--block mt-md">Puna stranica sa istorijom →</a>
    </main>

    <main class="main-content hidden" id="panel-ucitelj">
      <p class="text-muted text-center mb-md" style="font-size:var(--font-size-sm)">
        Naučite osnove domaćinstva — kratke lekcije na srpskom.
      </p>
      <div id="teacher-topics"></div>
    </main>

    <nav class="bottom-nav" id="bottom-nav"></nav>
  </div>

  <script src="../config.js" onerror="void 0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui-helpers.js"></script>
  <script src="../js/modules/ai-context.js"></script>
  <script src="../js/modules/ai-providers/prompt.js"></script>
  <script src="../js/modules/ai-providers/local-rules.js"></script>
  <script src="../js/modules/ai-providers/openai.js"></script>
  <script src="../js/modules/ai-providers/ollama.js"></script>
  <script src="../js/modules/ai-providers/registry.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/help-tooltips.js"></script>
  <script src="../js/pages/repairs.js"></script>
  <script src="../js/pages/ai.js"></script>
</body>
</html>
