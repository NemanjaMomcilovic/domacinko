<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d8f5c">
  <title>Domaćinko — Profil kuće</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../assets/icons/icon-192.png" type="image/png">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header" id="page-header"></header>
    <main class="main-content">
      <p class="text-muted text-center mb-md" style="font-size:var(--font-size-sm)">
        Podaci o vašem domu pomažu Domaćinku da daje bolje savete.
      </p>
      <form id="profile-form" class="card card--flat" style="padding:var(--space-md)">
        <div class="form-group">
          <label class="form-label" for="sq-meters">Kvadratura (m²)</label>
          <input type="number" class="form-input" id="sq-meters" min="1" placeholder="npr. 65">
        </div>
        <div class="form-group">
          <label class="form-label" for="home-type">Tip stana/kuće</label>
          <select class="form-select" id="home-type">
            <option value="apartment">Stan</option>
            <option value="house">Kuća</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="heating-type">Grejanje</label>
          <select class="form-select" id="heating-type">
            <option value="gas">Gas</option>
            <option value="electric">Struja</option>
            <option value="central">Centralno</option>
          </select>
        </div>
        <button type="submit" class="btn btn--primary btn--block">Sačuvaj profil</button>
      </form>
      <div class="section mt-md">
        <h2 class="section__title">Aparati</h2>
        <div class="card card--flat" id="appliances-list"></div>
        <div class="card card--flat mt-sm" style="padding:var(--space-md)">
          <div class="form-group">
            <input type="text" class="form-input" id="appliance-name" placeholder="Naziv aparata">
          </div>
          <div style="display:flex;gap:var(--space-sm)">
            <input type="text" class="form-input" id="appliance-type" placeholder="Tip" style="flex:1">
            <input type="date" class="form-input" id="appliance-date" style="flex:1">
          </div>
          <button type="button" class="btn btn--secondary btn--block mt-sm" id="add-appliance">Dodaj aparat</button>
        </div>
      </div>
    </main>
    <nav class="bottom-nav" id="bottom-nav"></nav>
  </div>
  <script src="../config.js" onerror="void 0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/pages/house-profile.js"></script>
</body>
</html>
