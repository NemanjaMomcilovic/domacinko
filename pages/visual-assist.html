<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d8f5c">
  <title>Domaćinko — Vizuelni asistent</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../assets/icons/icon-192.png" type="image/png">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header" id="page-header"></header>
    <main class="main-content">
      <p class="text-muted text-center mb-md" style="font-size:var(--font-size-sm)">
        Slikaj ventil, osigurač, fleku, biljku ili aparat — Domaćinko će pomoći.
      </p>
      <div class="card card--flat" style="padding:var(--space-md)">
        <div class="visual-preview" id="visual-preview">
          <span>📷 Dodajte ili slikajte fotografiju</span>
        </div>
        <input type="file" id="visual-input" accept="image/*" capture="environment" hidden>
        <div style="display:flex;gap:var(--space-sm);margin-top:var(--space-sm)">
          <button type="button" class="btn btn--secondary" style="flex:1" id="pick-photo">Izaberi sliku</button>
          <button type="button" class="btn btn--primary" style="flex:1" id="analyze-photo" disabled>Analiziraj</button>
        </div>
        <div class="form-group mt-md">
          <label class="form-label" for="visual-note">Šta vas zanima? (opciono)</label>
          <input type="text" class="form-input" id="visual-note" placeholder="npr. fleka na zidu, curenje">
        </div>
      </div>
      <div class="card card--flat mt-md hidden" id="visual-result" style="padding:var(--space-md)"></div>
    </main>
    <nav class="bottom-nav" id="bottom-nav"></nav>
  </div>
  <script src="../config.js" onerror="void 0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui-helpers.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/help-tooltips.js"></script>
  <script src="../js/pages/visual-assist.js"></script>
</body>
</html>
