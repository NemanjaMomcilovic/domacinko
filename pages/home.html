<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d8f5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Domaćinko">
  <title>Domaćinko — Početna</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../assets/icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.svg">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-container">
    <main class="main-content">
      <div class="greeting">
        <h1 class="greeting__text" id="greeting">Dobro jutro!</h1>
        <p class="greeting__sub" id="household-status">Domaćinstvo</p>
      </div>

      <div id="month-comparison"></div>

      <div class="card text-center">
        <p class="card__title">Finansijsko zdravlje</p>
        <div id="health-score"></div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card__label">Potrošeno</div>
          <div class="stat-card__value" id="monthly-spent">0 RSD</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Budžet</div>
          <div class="stat-card__value" id="monthly-budget">0 RSD</div>
        </div>
        <div class="stat-card stat-card--highlight" style="grid-column: span 2">
          <div class="stat-card__label">Preostalo</div>
          <div class="stat-card__value stat-card__value--positive" id="remaining">0 RSD</div>
        </div>
      </div>

      <div class="card" id="savings-card">
        <p class="card__title">Cilj štednje</p>
        <div id="savings-progress"></div>
      </div>

      <div class="advice-banner mb-md">
        <div class="advice-banner__label">Savet dana 💚</div>
        <p class="advice-banner__text" id="daily-advice">Učitavanje...</p>
      </div>

      <p class="text-muted text-center hidden" id="shopping-hint" style="font-size:var(--font-size-sm);margin-bottom:var(--space-md)"></p>

      <div class="section hidden" id="recurring-section">
        <div class="section__header">
          <h2 class="section__title">Podsetnici</h2>
        </div>
        <div class="card card--flat" id="recurring-reminders"></div>
      </div>

      <div class="section">
        <div class="section__header">
          <h2 class="section__title">Današnji zadaci</h2>
        </div>
        <div class="card card--flat" id="tasks-list"></div>
      </div>

      <div class="section">
        <div class="section__header">
          <h2 class="section__title">Poslednji troškovi</h2>
          <a href="add-expense.html" class="section__link">Svi →</a>
        </div>
        <div class="card card--flat" id="latest-expenses"></div>
      </div>

      <div class="section">
        <h2 class="section__title mb-md">Brze akcije</h2>
        <div class="quick-actions">
          <a href="add-expense.html" class="quick-action">
            <span class="quick-action__icon">💸</span>
            Dodaj trošak
          </a>
          <a href="meal-plan.html" class="quick-action">
            <span class="quick-action__icon">🍽️</span>
            Plan obroka
          </a>
          <a href="scan-receipt.html" class="quick-action">
            <span class="quick-action__icon">📷</span>
            Skeniraj račun
          </a>
          <a href="household.html" class="quick-action">
            <span class="quick-action__icon">🏡</span>
            Domaćinstvo
          </a>
        </div>
      </div>
    </main>

    <nav class="bottom-nav" id="bottom-nav"></nav>
  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/pages/home.js"></script>
</body>
</html>
