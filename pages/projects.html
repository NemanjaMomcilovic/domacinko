<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d8f5c">
  <title>Domaćinko — Projekti</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../assets/icons/icon-192.png" type="image/png">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header" id="page-header"></header>
    <main class="main-content">
      <div class="card card--flat" id="projects-list"></div>
      <div class="section mt-md">
        <h2 class="section__title">Novi projekat</h2>
        <div class="card card--flat" style="padding:var(--space-md)">
          <div class="form-group">
            <input type="text" class="form-input" id="proj-name" placeholder="npr. Farbanje dnevne sobe">
          </div>
          <div style="display:flex;gap:var(--space-sm)">
            <input type="number" class="form-input" id="proj-budget" placeholder="Budžet" style="flex:1">
            <input type="text" class="form-input" id="proj-dims" placeholder="Dimenzije" style="flex:1">
          </div>
          <div class="form-group mt-sm">
            <label class="form-label" for="proj-photo">Fotografija (opciono)</label>
            <input type="file" class="form-input" id="proj-photo" accept="image/*">
            <div id="proj-photo-preview"></div>
          </div>
          <button type="button" class="btn btn--primary btn--block mt-sm" id="add-project">Kreiraj projekat</button>
        </div>
      </div>
      <div id="project-detail" class="hidden"></div>
    </main>
    <nav class="bottom-nav" id="bottom-nav"></nav>
  </div>
  <script src="../config.js" onerror="void 0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui-helpers.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/pages/projects.js"></script>
</body>
</html>
