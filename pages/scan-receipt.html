<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domaćinko — Skeniraj račun</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header" id="page-header"></header>

    <main class="main-content main-content--no-nav">
      <p class="text-muted text-center mb-md">
        Fotografišite ili otpremite sliku računa. Za sada je dostupan samo pregled.
      </p>

      <div class="receipt-preview" id="receipt-preview">
        <span style="font-size:3rem">🧾</span>
        <p>Još nema slike računa</p>
      </div>

      <input type="file" id="receipt-file" accept="image/*" class="hidden">
      <input type="file" id="receipt-camera" accept="image/*" capture="environment" class="hidden">

      <div style="display:flex;gap:var(--space-md);margin-top:var(--space-lg)">
        <button class="btn btn--primary btn--block" id="btn-camera">📷 Fotografiši</button>
        <button class="btn btn--secondary btn--block" id="btn-upload">📁 Otpremi</button>
      </div>
    </main>
  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/pages/scan-receipt.js"></script>
</body>
</html>
