<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d8f5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Domaćinko">
  <title>Domaćinko — Skeniraj račun</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../assets/icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.png">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header" id="page-header"></header>

    <main class="main-content main-content--no-nav">
      <p class="text-muted text-center mb-md">
        Fotografišite ili otpremite sliku računa — Domaćinko će pročitati podatke.
      </p>

      <div class="receipt-preview" id="receipt-preview">
        <span style="font-size:3rem">🧾</span>
        <p>Još nema slike računa</p>
      </div>

      <div id="ocr-status" class="hidden"></div>

      <div id="extracted-form" class="hidden">
        <div class="card card--flat mt-md">
          <h3 class="section__title mb-md">Prepoznati podaci</h3>
          <div class="form-group">
            <label class="form-label" for="ocr-store">Prodavnica</label>
            <input type="text" class="form-input" id="ocr-store">
          </div>
          <div class="form-group">
            <label class="form-label" for="ocr-amount">Iznos</label>
            <input type="number" class="form-input" id="ocr-amount" min="1" step="1">
          </div>
          <div class="form-group">
            <label class="form-label" for="ocr-date">Datum</label>
            <input type="date" class="form-input" id="ocr-date">
          </div>
          <div class="form-group">
            <label class="form-label" for="ocr-category">Kategorija</label>
            <select class="form-select" id="ocr-category"></select>
          </div>
          <button class="btn btn--primary btn--block" id="btn-create-expense">Kreiraj trošak</button>
        </div>
      </div>

      <input type="file" id="receipt-file" accept="image/*" class="hidden">
      <input type="file" id="receipt-camera" accept="image/*" capture="environment" class="hidden">

      <div style="display:flex;gap:var(--space-md);margin-top:var(--space-lg)" id="upload-buttons">
        <button class="btn btn--primary btn--block" id="btn-camera">📷 Fotografiši</button>
        <button class="btn btn--secondary btn--block" id="btn-upload">📁 Otpremi</button>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="../config.js" onerror="void 0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui-helpers.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/help-tooltips.js"></script>
  <script src="../js/pages/scan-receipt.js"></script>
</body>
</html>
