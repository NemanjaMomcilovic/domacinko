<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2f8a5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Domaćinko — Obroci</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../assets/icons/icon-192.png" type="image/png">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header" id="page-header"></header>

    <main class="main-content">
      <p class="greeting__tagline mb-md">Prati troškove, planira obroke, pita savetnika.</p>

      <section class="section meal-today-section" id="meal-today-section">
        <div class="section__header">
          <h2 class="section__title">Danas</h2>
          <button type="button" class="btn btn--primary btn--sm" id="generate-shopping-today"
            aria-label="Dodaj sastojke za danas na listu kupovine">
            🛒 Dodaj na kupovinu
          </button>
        </div>
        <div class="card card--soft" id="meal-today"></div>
      </section>

      <div class="section mb-md hidden" id="meal-empty-hint"></div>

      <section class="section">
        <h2 class="section__title mb-md">Nedelja</h2>
        <div class="card card--flat" id="meal-days"></div>
      </section>

      <button type="button" class="btn btn--secondary btn--block mb-md" id="generate-shopping">
        Dodaj sve sastojke za nedelju na listu
      </button>

      <div class="section">
        <h2 class="section__title mb-md">Šta mogu da skuvam?</h2>
        <div class="card card--flat" id="cook-suggestions"></div>
        <p class="text-muted mt-sm" style="font-size:var(--font-size-xs)">
          Dodajte namirnice u Domaćinstvo → Ostava da biste dobili predloge.
        </p>
      </div>
    </main>

    <div id="meal-modal-root"></div>

    <nav class="bottom-nav" id="bottom-nav"></nav>
  </div>

  <script src="../config.js" onerror="void 0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui-helpers.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/help-tooltips.js"></script>
  <script src="../js/modules/briefing.js"></script>
  <script src="../js/pages/meal-plan.js"></script>
</body>
</html>
