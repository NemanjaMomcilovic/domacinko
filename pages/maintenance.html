<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d8f5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Domaćinko">
  <title>Domaćinko — Održavanje</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../assets/icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.png">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header" id="page-header"></header>

    <main class="main-content">
      <p class="text-muted text-center mb-md" style="font-size:var(--font-size-sm)">
        Redovni servisi i sezonski poslovi — ne zaboravite bojler, filter, klimu i više.
      </p>

      <div id="maintenance-list"></div>

      <div class="section">
        <h2 class="section__title">Dodaj zadatak</h2>
        <div class="card card--flat" style="padding:var(--space-md)">
          <div class="form-group">
            <input type="text" class="form-input" id="maint-name" placeholder="Naziv zadatka">
          </div>
          <div style="display:flex;gap:var(--space-sm)">
            <div class="form-group" style="flex:1">
              <label class="form-label" for="maint-interval">Interval (meseci)</label>
              <input type="number" class="form-input" id="maint-interval" min="1" max="60" value="6">
            </div>
            <div class="form-group" style="flex:1">
              <label class="form-label" for="maint-last-done">Poslednji put</label>
              <input type="date" class="form-input" id="maint-last-done">
            </div>
          </div>
          <button type="button" class="btn btn--secondary btn--block" id="add-maintenance">Dodaj zadatak</button>
        </div>
      </div>
    </main>

    <nav class="bottom-nav" id="bottom-nav"></nav>
  </div>

  <script src="../config.js" onerror="void 0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui-helpers.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/help-tooltips.js"></script>
  <script src="../js/pages/maintenance.js"></script>
</body>
</html>
