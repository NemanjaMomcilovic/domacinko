<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d8f5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Domaćinko">
  <title>Domaćinko — Finansije</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../assets/icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.svg">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header" id="page-header"></header>

    <main class="main-content">
      <div id="fin-comparison"></div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card__label">Budžet</div>
          <div class="stat-card__value" id="fin-budget">0 RSD</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Potrošeno</div>
          <div class="stat-card__value" id="fin-spent">0 RSD</div>
        </div>
      </div>

      <div class="card text-center">
        <p class="card__title">Preostali budžet</p>
        <p class="card__value text-success" id="fin-remaining">0 RSD</p>
      </div>

      <div class="card">
        <p class="card__title">Cilj štednje</p>
        <div id="fin-savings-progress"></div>
      </div>

      <div class="section" id="category-budgets-section">
        <h2 class="section__title mb-md">Budžet po kategorijama</h2>
        <div class="card card--flat" id="category-budgets"></div>
        <p class="text-muted mt-sm" style="font-size:var(--font-size-xs)">Podesite limite u Podešavanjima → Budžet po kategorijama.</p>
      </div>

      <div class="card text-center">
        <p class="card__title">Finansijsko zdravlje</p>
        <div id="fin-health-score"></div>
        <p class="card__subtitle mt-sm" id="score-label"></p>
      </div>

      <div class="section">
        <h2 class="section__title mb-md">Filteri</h2>
        <div class="filters-row">
          <select class="form-select" id="filter-category"></select>
          <div style="display:flex;gap:var(--space-sm)">
            <input type="date" class="form-input" id="filter-from" style="flex:1">
            <input type="date" class="form-input" id="filter-to" style="flex:1">
          </div>
        </div>
      </div>

      <div class="section">
        <h2 class="section__title mb-md">Troškovi po kategorijama</h2>
        <div class="card card--flat" id="category-breakdown"></div>
      </div>

      <div class="section">
        <h2 class="section__title mb-md">Grafikon</h2>
        <div class="card card--flat">
          <div class="chart-container">
            <canvas id="category-chart"></canvas>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section__header">
          <h2 class="section__title">Svi troškovi</h2>
        </div>
        <div class="card card--flat" id="expenses-list"></div>
      </div>

      <a href="add-expense.html" class="btn btn--primary btn--block">Dodaj trošak</a>
    </main>

    <nav class="bottom-nav" id="bottom-nav"></nav>
  </div>

  <div id="edit-modal-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/pages/finances.js"></script>
</body>
</html>
