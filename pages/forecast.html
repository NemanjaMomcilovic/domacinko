<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d8f5c">
  <title>Domaćinko — Prognoza troškova</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../assets/icons/icon-192.png" type="image/png">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header" id="page-header"></header>
    <main class="main-content">
      <p class="text-muted text-center mb-md" style="font-size:var(--font-size-sm)">
        Predviđeni troškovi na osnovu računa, auta, rođendana i pretplata.
      </p>
      <div class="filters-row mb-md">
        <select class="form-select" id="forecast-month"></select>
        <select class="form-select" id="forecast-year"></select>
      </div>
      <div class="card card--gradient-green text-center mb-md">
        <p class="card__title">Ukupno očekivano</p>
        <p class="card__value" id="forecast-total">0 RSD</p>
        <p class="card__subtitle text-muted" id="forecast-note"></p>
      </div>
      <div class="section">
        <h2 class="section__title">Kalendar troškova</h2>
        <div class="card card--flat" id="forecast-calendar"></div>
      </div>
    </main>
    <nav class="bottom-nav" id="bottom-nav"></nav>
  </div>
  <script src="../config.js" onerror="void 0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/pages/forecast.js"></script>
</body>
</html>
