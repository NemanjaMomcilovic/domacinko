<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d8f5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Domaćinko">
  <title>Domaćinko — AI Majstor</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../assets/icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.png">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header" id="page-header"></header>

    <main class="main-content">
      <p class="text-muted text-center mb-md" style="font-size:var(--font-size-sm)">
        Opišite problem i dobijte korak-po-korak savet — DIY ili pozovite majstora.
      </p>

      <div class="section">
        <h2 class="section__title mb-md">Kategorija</h2>
        <div class="quick-chips" id="repair-categories" style="padding:0"></div>
      </div>

      <div class="card">
        <div class="form-group">
          <label class="form-label" for="repair-problem">Opis problema</label>
          <textarea class="form-textarea" id="repair-problem" rows="3" placeholder="npr. Slavina u kuhinji curi ispod caure..."></textarea>
        </div>
        <button type="button" class="btn btn--primary btn--block" id="repair-submit">Daj savet</button>
      </div>

      <div id="repair-result" class="mt-md"></div>

      <div class="section">
        <h2 class="section__title">Istorija popravki</h2>
        <div class="card card--flat" id="repair-history"></div>
      </div>
    </main>

    <nav class="bottom-nav" id="bottom-nav"></nav>
  </div>

  <script src="../config.js" onerror="void 0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui-helpers.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/help-tooltips.js"></script>
  <script src="../js/pages/repairs.js"></script>
</body>
</html>
