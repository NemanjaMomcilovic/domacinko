<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d8f5c">
  <title>Domaćinko — Bezbednost</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../assets/icons/icon-192.png" type="image/png">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="page-header" id="page-header"></header>
    <main class="main-content">
      <div id="safety-alert-banner" class="hidden mb-md"></div>
      <div class="card card--flat" id="safety-reminders"></div>
      <form id="safety-form" class="card card--flat mt-md" style="padding:var(--space-md)">
        <h2 class="section__title mb-md">Evidencija</h2>
        <div class="form-group">
          <label class="form-label" for="fire-ext">Aparat za gašenje — ističe</label>
          <input type="date" class="form-input" id="fire-ext">
        </div>
        <div class="form-group">
          <label class="form-label" for="co-det">CO detektor — ističe</label>
          <input type="date" class="form-input" id="co-det">
        </div>
        <div class="form-group">
          <label class="form-label" for="first-aid">Prva pomoć — provera</label>
          <input type="date" class="form-input" id="first-aid">
        </div>
        <button type="submit" class="btn btn--primary btn--block">Sačuvaj</button>
      </form>
      <div class="section mt-md">
        <h2 class="section__title">Lekovi (rok trajanja)</h2>
        <div class="card card--flat" id="medicines-list"></div>
        <div class="card card--flat mt-sm" style="padding:var(--space-md)">
          <input type="text" class="form-input" id="med-name" placeholder="Naziv leka">
          <input type="date" class="form-input mt-sm" id="med-expiry">
          <button type="button" class="btn btn--secondary btn--block mt-sm" id="add-med">Dodaj lek</button>
        </div>
      </div>
    </main>
    <nav class="bottom-nav" id="bottom-nav"></nav>
  </div>
  <script src="../config.js" onerror="void 0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui-helpers.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/pages/safety.js"></script>
</body>
</html>
