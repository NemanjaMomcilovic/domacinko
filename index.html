<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d8f5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Domaćinko">
  <title>Domaćinko</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <p style="text-align:center;padding:2rem;">Učitavanje Domaćinka...</p>
  <script src="js/storage.js"></script>
  <script>
    (function () {
      if (!localStorage.getItem('splashSeen')) {
        window.location.replace('splash.html');
        return;
      }
      if (!localStorage.getItem('onboardingComplete')) {
        window.location.replace('pages/onboarding.html');
      } else {
        window.location.replace('pages/home.html');
      }
    })();
  </script>
</body>
</html>
